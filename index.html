<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Transcript</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.hero p{
color:#cbd5e1;
margin-bottom:30px;
}

.upload-box{
background:#1e293b;
max-width:500px;
margin:auto;
padding:30px;
border-radius:15px;
}

input[type=file]{
width:100%;
padding:10px;
margin-top:15px;
margin-bottom:20px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.result{
max-width:800px;
margin:50px auto;
padding:20px;
background:#1e293b;
border-radius:15px;
}

textarea{
width:100%;
height:200px;
padding:10px;
border:none;
border-radius:10px;
margin-top:15px;
}
</style>

</head>
<body>

<section class="hero">
<h1>AI Transcript</h1>
<p>Convert Audio & Video into Text instantly</p>

<div class="upload-box">
<input type="file">
<br>
<button>Generate Transcript</button>
</div>
</section>

<div class="result">
<h2>Transcript Result</h2>
<textarea placeholder="Transcript will appear here..."></textarea>
</div>

</body>
</html>
